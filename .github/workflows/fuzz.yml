name: Scheduled Fuzzing

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: read

jobs:
  fuzz:
    name: LibFuzzer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libtcc-dev ccache

    - name: Prepare ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-fuzz-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-fuzz-
          ${{ runner.os }}-ccache-

    - name: Build Fuzzer
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        make fuzz-libfuzzer-build

    - name: Prepare Corpus
      run: make fuzz-corpus

    - name: Run Fuzzer
      run: |
        ./zc-fuzz-libfuzzer fuzz/corpus -max_total_time=900 -timeout=30 -rss_limit_mb=2048 || true

    - name: Upload Crashes and Timeouts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fuzz-crashes
        path: |
          crash-*
          timeout-*
        if-no-files-found: ignore
